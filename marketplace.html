<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>UpCycleX — Upcycled Marketplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: url("images/background.jpg") no-repeat center center fixed;
    background-size: cover;
    color: #1f2937; 
    min-height: 100vh;
  }

  .main-overlay {
    background: rgba(255, 255, 255, 0.88);
    min-height: 100vh;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f3f4f6; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(145deg, #e3fd64, #d48a55, #3e0b90);
    border-radius: 999px;
  }

  .filter-focus:focus {
    box-shadow: 0 0 0 2px #84cc16;
    outline: none;
    border-color: #84cc16;
  }
</style>
</head>

<body>
<div class="main-overlay">

<header class="text-gray-700 body-font" style="
  background: linear-gradient(145deg,#e3fd64,#d48a55,#3e0b90);
  box-shadow: inset 0 6px 18px rgba(71, 30, 30, 0.6),
              inset 0 -6px 18px rgba(253, 24, 24, 0.08);
  backdrop-filter: blur(10px);
">
  <div class="container mx-auto flex flex-wrap p-5 flex-col md:flex-row items-center">
      <a href="index.html" class="flex title-font font-medium items-center text-gray-800 mb-4 md:mb-0">
          <img src="images/recycleLogo.png" alt="UpCycleX" class="w-20 h-20 rounded-full p-2 object-contain">
          <span class="ml-3 text-xl font-bold">UpCycleX</span>
      </a>
      <nav class="md:ml-auto md:mr-auto flex flex-wrap items-center text-base justify-center">
        <a href="index.html" class="mr-6 hover:text-emerald-600 transition-colors font-medium">Home</a>
          <a href="upload.html" class="mr-5 hover:text-gray-900">Upload</a>
          <a href="connect.html" class="mr-5 hover:text-gray-900">Connect</a>
          <a href="marketplace.html" class="mr-5 hover:text-gray-900 font-bold underline">Market Place</a>
          
          <a href="policy.html" class="mr-5 hover:text-gray-900">Our Policies</a>
          <a href="upload-admin.html" class="mr-5 hover:text-gray-800">Sale market</a>
          <a href="cart.html" class="mr-5 hover:text-gray-800">Cart</a>
      </nav>
      <button class="inline-flex items-center bg-gray-200 border-0 py-1 px-3 focus:outline-none hover:bg-gray-500 rounded text-base mt-4 md:mt-0"  onclick="window.location.href='loginup.html'">Sign In/ Sign Up
      <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="w-4 h-4 ml-1" viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"></path>
      </svg>
    </button>
  </div>
</header>

<section class="py-12">
  <div class="container mx-auto px-4 text-center max-w-4xl">
    <h1 class="text-4xl md:text-5xl font-black mb-4 text-gray-900">
      Upcycled <span class="text-emerald-600">Marketplace</span>
    </h1>
    <p class="text-gray-600 font-medium mb-10">
      Discover Unique — Handcrafted — Sustainable Creations ♻
    </p>

    <div class="flex flex-col md:flex-row gap-4 max-w-3xl mx-auto mb-10">
      <div class="relative flex-1">
        <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="Search products or artists..." 
        class="filter-focus w-full px-6 py-4 rounded-2xl bg-white border border-gray-200 text-gray-800 shadow-sm pl-12 transition-all">
        <svg class="w-6 h-6 absolute left-4 top-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
      
      <select id="categorySelect" onchange="filterProducts()" 
      class="filter-focus px-6 py-4 rounded-2xl bg-white border border-gray-200 text-gray-700 font-medium shadow-sm cursor-pointer md:w-64">
        <option value="all">All Categories</option>
        <option value="Bags & Accessories">Bags & Accessories</option>
        <option value="Home Decor">Home Decor</option>
        <option value="Home Textiles">Home Textiles</option>
        <option value="Garden & Plants">Garden & Plants</option>
        <option value="Fashion">Fashion</option>
      </select>
    </div>

    <div class="flex justify-center items-center gap-6 text-sm">
        <button onclick="sortPrice()" class="font-bold text-emerald-700 hover:text-emerald-500 transition flex items-center gap-2">
            <i class="fas fa-sort-amount-down"></i> Sort by Price
        </button>
        <div class="h-4 w-px bg-gray-300"></div>
        <div class="flex items-center gap-2 text-gray-500">
            <span class="font-bold">Grid:</span>
            <button onclick="setGrid(1)" class="w-8 h-8 flex items-center justify-center bg-white border rounded hover:bg-gray-50">1</button>
            <button onclick="setGrid(3)" class="w-8 h-8 flex items-center justify-center bg-white border rounded hover:bg-gray-50">3</button>
        </div>
    </div>
  </div>
</section>

<section class="pb-20">
  <div class="container mx-auto px-4">
    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      </div>
  </div>
</section>

</div>

<script>
const products = [
  { title:"Denim Tote Bag", artist:"Priya Sharma", price:899, category:"Bags & Accessories", img:"https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500" },
  { title:"Bottle Lamp", artist:"Raj Kumar", price:1299, category:"Home Decor", img:"https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?w=500" },
  { title:"Saree Cushion", artist:"Lakshmi Rao", price:649, category:"Home Textiles", img:"https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=500" },
  { title:"Wood Planter", artist:"Karan Malhotra", price:1599, category:"Garden & Plants", img:"https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=500" },
  { title:"Patch Jacket", artist:"Arjun Patel", price:2499, category:"Fashion", img:"https://images.unsplash.com/photo-1551028719-00167b16eac5?w=500" }
];

function filterProducts() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const category = document.getElementById("categorySelect").value;
  const grid = document.getElementById("productGrid");
  
  const filtered = products.filter(p => {
    const matchesSearch = p.title.toLowerCase().includes(query) || p.artist.toLowerCase().includes(query);
    const matchesCategory = category === "all" || p.category === category;
    return matchesSearch && matchesCategory;
  });

  grid.innerHTML = filtered.map(p => `
    <div class="bg-white rounded-2xl border border-gray-200 shadow-md hover:shadow-xl transition-all overflow-hidden group">
      <div class="relative overflow-hidden">
        <img src="${p.img}" class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-500">
        <span class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-lg text-xs font-bold text-emerald-700 shadow-sm">${p.category}</span>
      </div>
      <div class="p-6">
        <h3 class="font-bold text-xl text-gray-800">${p.title}</h3>
        <p class="text-gray-500 text-sm mb-4">by ${p.artist}</p>
        <div class="flex justify-between items-center">
          <span class="text-2xl font-black text-gray-900">₹${p.price}</span>
          <button class="bg-lime-400 hover:bg-lime-500 text-gray-900 px-4 py-2 rounded-xl font-bold transition shadow-sm">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

function sortPrice() {
    products.sort((a,b) => a.price - b.price);
    filterProducts();
}

function setGrid(n) {
    document.getElementById("productGrid").className = `grid gap-8 grid-cols-1 md:grid-cols-${n}`;
}

// Initial Load
filterProducts();
</script>

</body>
</html>
