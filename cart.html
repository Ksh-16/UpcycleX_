<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UpCycleX — Cart</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="text-gray-800 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');">

<!-- Light overlay for readability -->
<div class="absolute inset-0 bg-white/70 backdrop-blur-sm"></div>

<div class="relative z-10">

<!-- NAVBAR -->
<header class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-xl font-bold">UpCycleX</h1>
    <div class="flex gap-4">
      <span>Wishlist ❤️ (<span id="wishCount">0</span>)</span>
      <span>Cart 🛒 (<span id="cartCount">0</span>)</span>
    </div>
  </div>
</header>

<section class="max-w-6xl mx-auto py-8 px-4 grid md:grid-cols-3 gap-6">

<!-- CART ITEMS -->
<div class="md:col-span-2 space-y-4">
  <h2 class="text-2xl font-semibold">Shopping Cart</h2>
  <div id="cartList"></div>
</div>

<!-- SUMMARY -->
<div class="bg-white rounded-2xl shadow-lg p-5 h-fit sticky top-20">
  <h2 class="text-xl font-semibold mb-4">Order Summary</h2>

  <input id="coupon" placeholder="Coupon code"
    class="w-full border px-3 py-2 rounded mb-3 focus:ring-2 focus:ring-blue-400" />

  <button onclick="applyCoupon()"
    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
    Apply
  </button>

  <div id="total" class="mt-4 text-sm"></div>

  <button onclick="checkout()"
    class="mt-5 w-full bg-green-500 text-white py-3 rounded hover:bg-green-600">
    Checkout
  </button>
</div>

</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let discount = 0;
let delivery = 50;

const list = document.getElementById("cartList");
const totalEl = document.getElementById("total");

function updateCounts(){
  document.getElementById("cartCount").textContent = cart.length;
  document.getElementById("wishCount").textContent = wishlist.length;
}

function renderCart(){
  list.innerHTML = "";
  let total = 0;

  if(cart.length === 0){
    list.innerHTML = "<p class='text-gray-500'>Cart is empty</p>";
    totalEl.innerHTML = "";
    updateCounts();
    return;
  }

  cart.forEach(item => {
    total += Number(item.price) * (item.qty || 1);

    let div = document.createElement("div");
    div.className = "bg-white p-4 rounded-xl shadow flex justify-between items-center";

    div.innerHTML = `
      <div>
        <p class="font-semibold">${item.title}</p>
        <p class="text-sm text-gray-500">₹${item.price}</p>
      </div>

      <div class="flex items-center gap-3">
        <button onclick="changeQty(${item.id}, -1)" class="px-2 bg-gray-200 rounded">-</button>
        <span>${item.qty || 1}</span>
        <button onclick="changeQty(${item.id}, 1)" class="px-2 bg-gray-200 rounded">+</button>

        <button onclick="moveToWishlist(${item.id})" class="text-pink-500">♡</button>
        <button onclick="removeItem(${item.id})" class="text-red-500">✕</button>
      </div>
    `;

    list.appendChild(div);
  });

  let finalTotal = total - discount + delivery;
  if(finalTotal < 0) finalTotal = 0;

  totalEl.innerHTML = `
    Subtotal: ₹${total} <br>
    Discount: ₹${discount} <br>
    Delivery: ₹${delivery} <br>
    <b class="text-green-600">Total: ₹${finalTotal}</b>
  `;

  updateCounts();
}

function changeQty(id, val){
  cart = cart.map(i => {
    if(i.id === id){
      i.qty = (i.qty || 1) + val;
      if(i.qty < 1) i.qty = 1;
    }
    return i;
  });
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function removeItem(id){
  cart = cart.filter(i => i.id !== id);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function moveToWishlist(id){
  let item = cart.find(i => i.id === id);
  wishlist.push(item);
  cart = cart.filter(i => i.id !== id);

  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("wishlist", JSON.stringify(wishlist));

  renderCart();
}

function applyCoupon(){
  let code = document.getElementById("coupon").value;

  if(code === "SAVE10") discount = 100;
  else if(code === "FREESHIP") delivery = 0;
  else alert("Invalid coupon");

  renderCart();
}

function checkout(){
  alert("Integrate Razorpay / Stripe here");
}

renderCart();
</script>

</div>
</body>
</html>
